name: Report a crash
description: LingCode is crashing or freezing or hanging.
type: Crash
labels: "state:needs triage"
body:
  - type: textarea
    attributes:
      label: Reproduction steps
      description: A step-by-step description of how to reproduce the crash from a **clean LingCode install**. The more context you provide, the easier it is to find and fix the problem fast.
      placeholder: |
        1. Start LingCode
        2. Perform an action
        3. LingCode crashes
    validations:
      required: true
  - type: textarea
    attributes:
      label: LingCode version and system specs
      description: |
        Open the command palette in LingCode, then type “lingcode: copy system specs into clipboard”.
      placeholder: |
        LingCode: v1.2.1
        OS: Windows 11
        Memory: 16 GiB
        Architecture: aarch64
    validations:
      required: true
  - type: textarea
    attributes:
      label: Attach LingCode log file
      description: |
        Open the command palette in LingCode, then type `lingcode: open log` to see the last 1000 lines. Or type `lingcode: reveal log in file manager` to reveal the log file itself.

        ⚠️ **Please review your log file for secrets (API keys, tokens, etc.) and partially or fully redact them before posting.**
      value: |
        <details><summary>LingCode.log</summary>

        <!-- Paste your log inside the code block. -->
        ```log

        ```

        </details>
    validations:
      required: false
