# LingCode release pipeline (fork-owned, GitHub-hosted runners).
#
# Unlike the upstream Zed release.yml — which needs Zed's self-hosted/Namespace
# runners and Azure code-signing secrets — this workflow builds on the standard
# GitHub-hosted `windows-latest` (x86_64) runner and produces an UNSIGNED
# installer. Unsigned means Windows SmartScreen will warn users on first run;
# add an Authenticate code-signing cert later (set the AZURE_* secrets and the
# bundle script will sign automatically).
#
# Triggers:
#   * push a tag like `v0.1.0`  -> builds + creates a GitHub Release with the installer
#   * manual "Run workflow"     -> builds + uploads the installer as a run artifact
#                                  (no Release created; good for testing)

name: LingCode Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel to build (stable/preview/nightly/dev)"
        required: false
        default: "stable"

permissions:
  contents: write # required to create a GitHub Release

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # The `pet` git dependency (microsoft/python-environment-tools) has a test
  # fixture path longer than Windows MAX_PATH. cargo's built-in libgit2 cannot
  # check it out; shelling out to the git CLI (with core.longpaths) can.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  # Keep the release build feasible on a 4-core/16 GB GitHub runner:
  # disable LTO and use many codegen units (the stock profile is lto=thin + cgu=1).
  CARGO_PROFILE_RELEASE_LTO: "false"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
  CARGO_PROFILE_RELEASE_DEBUG: "0"

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Windows long paths (for the deep `pet` dependency fixture)
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name LongPathsEnabled -Value 1 -PropertyType DWORD -Force | Out-Null

      - name: Select release channel
        shell: pwsh
        run: |
          $channel = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.channel }}" } else { "stable" }
          Set-Content -Path "crates/zed/RELEASE_CHANNEL" -Value $channel -NoNewline
          Write-Host "Building channel: $channel"

      - name: Install Rust (pinned by rust-toolchain.toml)
        shell: pwsh
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Bust the cache per-tag so release builds are reproducible
          key: lingcode-release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Warm cargo registry (so bundle's `cargo metadata --offline` works)
        shell: pwsh
        run: cargo fetch

      - name: Build installer
        shell: pwsh
        run: ./script/bundle-windows.ps1 -Architecture x86_64

      - name: Locate installer
        id: artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "target" -Filter "LingCode-*.exe" -File | Select-Object -First 1
          if (-not $exe) { Write-Error "No installer produced under target/"; exit 1 }
          Write-Host "Installer: $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload installer as run artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          draft: true
          generate_release_notes: true
          body: |
            LingCode ${{ github.ref_name }} for Windows (x86_64).

            > ⚠️ This build is **unsigned** — Windows SmartScreen may warn on first launch.
            > Click "More info" → "Run anyway", or add a code-signing certificate to remove the warning.
