# LingCode release pipeline (fork-owned, GitHub-hosted runners).
#
# Unlike the upstream Zed release.yml — which needs Zed's self-hosted/Namespace
# runners and Azure code-signing secrets — this workflow builds on the standard
# GitHub-hosted `windows-latest` (x86_64) runner and produces an UNSIGNED
# installer. Unsigned means Windows SmartScreen will warn users on first run;
# add an Authenticate code-signing cert later (set the AZURE_* secrets and the
# bundle script will sign automatically).
#
# Triggers:
#   * push a tag like `v0.1.0` or `win-v0.1.0` -> builds + creates a GitHub Release
#   * manual "Run workflow"     -> builds + uploads the installer as a run artifact
#                                  (no Release created; good for testing)

name: LingCode Release

on:
  push:
    tags:
      # Both conventions trigger a release: bare `v0.1.0` and the `win-v0.1.0`
      # form used by the first release. (The job builds Windows + Linux either way.)
      - "v*"
      - "win-v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel to build (stable/preview/nightly/dev)"
        required: false
        default: "stable"

permissions:
  contents: write # required to create a GitHub Release

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # The `pet` git dependency (microsoft/python-environment-tools) has a test
  # fixture path longer than Windows MAX_PATH. cargo's built-in libgit2 cannot
  # check it out; shelling out to the git CLI (with core.longpaths) can.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  # Keep the release build feasible on a 4-core/16 GB GitHub runner:
  # disable LTO and use many codegen units (the stock profile is lto=thin + cgu=1).
  CARGO_PROFILE_RELEASE_LTO: "false"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
  CARGO_PROFILE_RELEASE_DEBUG: "0"

jobs:
  windows:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    strategy:
      # Keep building the other arch even if one fails.
      fail-fast: false
      matrix:
        include:
          # Intel/AMD PCs — built on the standard x86 hosted runner.
          - arch: x86_64
            runner: windows-latest
          # ARM64 PCs (Snapdragon/Surface etc.) — MUST be built on a native
          # ARM64 runner. An x86_64 build only runs under emulation there, falls
          # back to the software GPU renderer, and the editor UI becomes
          # unresponsive (window opens but buttons aren't clickable).
          - arch: aarch64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Windows long paths (for the deep `pet` dependency fixture)
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name LongPathsEnabled -Value 1 -PropertyType DWORD -Force | Out-Null

      - name: Select release channel
        id: channel
        shell: pwsh
        run: |
          $channel = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.channel }}" } else { "stable" }
          Set-Content -Path "crates/zed/RELEASE_CHANNEL" -Value $channel -NoNewline
          "channel=$channel" >> $env:GITHUB_OUTPUT
          Write-Host "Building channel: $channel"

      - name: Install Rust (pinned by rust-toolchain.toml)
        shell: pwsh
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Per-arch key so the x86_64 and aarch64 builds don't share a cache.
          key: lingcode-release-${{ matrix.arch }}

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Warm cargo registry (so bundle's `cargo metadata --offline` works)
        shell: pwsh
        run: cargo fetch

      - name: Build installer
        shell: pwsh
        run: ./script/bundle-windows.ps1 -Architecture ${{ matrix.arch }}

      - name: Locate installer
        id: artifact
        shell: pwsh
        run: |
          # NAMING CONTRACT: the auto-updater matches this asset name EXACTLY
          # (crates/auto_update get_github_release_asset -> "LingCode-<arch>.exe").
          # Fail loudly if the installer isn't named as expected, rather than
          # publishing an asset clients can't find.
          $expected = "LingCode-${{ matrix.arch }}.exe"
          $exe = Get-ChildItem -Path "target" -Recurse -Filter $expected -File | Select-Object -First 1
          if (-not $exe) {
            Write-Error "Expected installer '$expected' not found under target/. The auto-update naming contract requires this exact name (set via AppSetupName in script/bundle-windows.ps1)."
            exit 1
          }
          Write-Host "Installer: $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload installer as run artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          # Published (not draft) so GitHub's releases/latest serves it to the
          # auto-updater. Non-stable channels are marked prerelease so they stay
          # OUT of releases/latest and stable users don't update onto them.
          draft: false
          prerelease: ${{ steps.channel.outputs.channel != 'stable' }}
          generate_release_notes: true
          body: |
            LingCode ${{ github.ref_name }} for Windows (${{ matrix.arch }}).

            Download the installer matching your PC:
            * **LingCode-x86_64.exe** — Intel / AMD PCs
            * **LingCode-aarch64.exe** — ARM64 PCs (Snapdragon, Surface Pro X, etc.)

            > ⚠️ This build is **unsigned** — Windows SmartScreen may warn on first launch.
            > Click "More info" → "Run anyway", or add a code-signing certificate to remove the warning.

  linux:
    name: build (linux-x86_64)
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    env:
      # zed's prebuilt webrtc-sys is compiled with clang; building it with the
      # default `c++` (g++) fails on src/frame_cryptor.cpp. Match upstream Zed's
      # workflows, which all set CC/CXX to clang. `script/linux` installs clang.
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select release channel
        id: channel
        shell: bash
        run: |
          channel="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'stable' }}"
          printf '%s' "$channel" > crates/zed/RELEASE_CHANNEL
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "Building channel: $channel"

      - name: Install Linux build dependencies (script/linux)
        run: ./script/linux

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: lingcode-release-linux-x86_64

      - name: Warm cargo registry (so bundle's `cargo metadata --offline` works)
        run: cargo fetch

      - name: Build release tarball
        run: ./script/bundle-linux

      - name: Locate tarball
        id: artifact
        shell: bash
        run: |
          file="$(find . -maxdepth 4 -name 'lingcode-linux-*.tar.gz' | head -1)"
          if [ -z "$file" ]; then echo "No Linux tarball produced"; exit 1; fi
          echo "Tarball: $file ($(du -h "$file" | cut -f1))"
          echo "path=$file" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$file")" >> "$GITHUB_OUTPUT"

      - name: Upload tarball as run artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Add to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          # Keep consistent with the Windows job (same tag/release): published, with
          # prerelease tracking the channel, so the draft state can't flip-flop by job order.
          draft: false
          prerelease: ${{ steps.channel.outputs.channel != 'stable' }}
          generate_release_notes: true
          body: |
            LingCode ${{ github.ref_name }} for Linux (x86_64).

            * **lingcode-linux-x86_64.tar.gz** — extract and run the bundled launcher (or install via the included script).

            > Built on ubuntu-22.04 (glibc 2.35) — works on recent distros; older ones may need a newer glibc.
